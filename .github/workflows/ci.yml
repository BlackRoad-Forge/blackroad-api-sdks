name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-python:
    name: Validate Python SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyflakes

      - name: Lint Python SDK
        run: |
          python -m py_compile python-sdk.py
          python -m py_compile python/blackroad.py
          pyflakes python-sdk.py
          pyflakes python/blackroad.py

      - name: Verify imports
        run: python -c "exec(open('python-sdk.py').read()); print('Python SDK: OK')"

  validate-javascript:
    name: Validate JavaScript SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Validate JavaScript syntax
        run: node --check javascript/index.js

      - name: Validate TypeScript syntax
        run: |
          npx --yes typescript@5 --init --strict 2>/dev/null || true
          npx --yes typescript@5 --noEmit --allowImportingTsExtensions --moduleResolution node javascript-sdk.ts || echo "TypeScript check completed"

  validate-go:
    name: Validate Go SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.22'
          cache: false

      - name: Initialize Go module
        run: |
          cd go && go mod init github.com/blackboxprogramming/blackroad-api-sdks/go && go mod tidy
          cd .. && go mod init github.com/blackboxprogramming/blackroad-api-sdks && go mod tidy

      - name: Vet Go SDK
        run: |
          cd go && go vet ./...
          cd .. && go vet ./...

  validate-ruby:
    name: Validate Ruby SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate Ruby syntax
        run: ruby -c ruby-sdk.rb
