name: Self-Healing

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check Health
        id: health
        run: |
          if [ -z "${{ secrets.DEPLOY_URL }}" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "No DEPLOY_URL configured, skipping health check"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.DEPLOY_URL }}/api/health" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check returned: $STATUS"

      - name: Auto-Rollback
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip'
        run: |
          echo "Health check failed (Status: ${{ steps.health.outputs.status }})"
          echo "Triggering rollback to previous commit..."
          PREV_SHA=$(git rev-parse HEAD~1)
          echo "Rolling back to $PREV_SHA"
          gh workflow run auto-deploy.yml --ref "$PREV_SHA"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Issue on Failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment,auto-generated'
            });
            const existing = issues.data.find(i => i.title.includes('Deployment Health Check Failed'));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Self-Healing: Deployment Health Check Failed',
                body: `Deployment health check failed.\n\nStatus: ${{ steps.health.outputs.status }}\nWorkflow: ${context.workflow}\nRun: ${context.runId}\nTimestamp: ${new Date().toISOString()}`,
                labels: ['bug', 'deployment', 'auto-generated']
              });
            }

  dependency-updates:
    name: Auto Update Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Update npm dependencies
        if: hashFiles('package.json') != ''
        run: |
          npm update
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package*.json
            git commit -m "chore: auto-update dependencies"
            git push
          fi
